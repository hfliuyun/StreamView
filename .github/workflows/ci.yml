name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test-package:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022
          - macos-15
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730
        with:
          version: 6.11.1
          cache: true

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci

      - name: Install deployable tree
        run: cmake --install build/ci --prefix dist

      - name: Upload package tree
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: streamview-${{ matrix.os }}
          path: dist
          if-no-files-found: error
